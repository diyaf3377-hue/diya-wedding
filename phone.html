<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diya & Rizwan</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {

  /* Envelope full screen */
  #intro {
    background-size: cover;   /* was contain */
  }

  /* Names */
  .names {
    font-size: 32px;
    line-height: 1.3;
    text-align: center;
  }

  /* Couple image */
  .photo img {
    width: 90%;
    max-width: 300px;
  }

  /* Wedding date text */
  .wedding-date {
    font-size: 20px;
    text-align: center;
  }

  /* Sections spacing */
  .section {
    margin: 15px;
    padding: 15px;
  }

  /* Countdown layout */
  .countdown {
    flex-wrap: wrap;
    gap: 8px;
  }

  .box {
    width: 55px;
    padding: 10px;
    font-size: 13px;
  }

  /* Calendar */
  .calendar {
    width: 100%;
    font-size: 14px;
  }

  .calendar td {
    padding: 6px;
  }

  /* Cards */
  .card {
    width: 100%;
    padding: 15px;
  }

  /* Button */
  .btn {
    width: 100%;
  }

}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(#f8f4ef, #efe7dc);
  text-align: center;  
}

/* ===== INTRO ===== */
#intro {
  height: 100vh;
  background: url('envelope.png') center no-repeat;
  background-size: contain;
  background-color: #f4efe9;
  position: relative;  
}

.click-area {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  height: 40%;
  cursor: pointer;
  border: 2px dashed red;
}

/* ===== MAIN ===== */
#main {
  display: none;
  background-image: url("inside-bg.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
  padding: 40px 10px;
}

#main::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.6);
  z-index: 0;
}

#main > * {
  position: relative;
  z-index: 1;
}

/* ===== SECTIONS ===== */
.section {
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  margin: 40px auto;
  padding: 40px 20px;
  max-width: 500px;
  text-align: center;
}

/* ===== NAMES ===== */
.names {
  font-family: 'Great Vibes';
  font-size: 55px;
  line-height: 1.4;
}

/* ===== PHOTO ===== */
.photo img {
  width: 260px;
  border-radius: 15px;
  margin-top: 20px;
 display: block;
  margin: 20px auto;
}

/* ===== COUNTDOWN ===== */
.countdown {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
}

.wedding-date {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  margin-top: 10px;
  letter-spacing: 1px;
}

.wedding-date-text {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  margin-top: 10px;
  letter-spacing: 1px;
}

.box {
  background: white;
  padding: 15px;
  width: 70px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}


.iframe {
  margin-top: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* ===== CALENDAR ===== */
.calendar {
  max-width: 350px;
  margin: 20px auto;
}

.calendar table {
  width: 100%;
  border-collapse: collapse;
}

.calendar th, .calendar td {
  padding: 10px;
}

.highlight {
  background: #d4af37;
  color: white;
  border-radius: 50%;
}

/* ===== CARD STYLE ===== */
.card {
  background: white;
  padding: 20px;
  margin: 20px auto;
  max-width: 400px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn {
  padding: 10px 20px;
  background: #d4af37;
  border: none;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="click-area" onclick="openInvite()"></div>
</div>

<!-- MAIN -->
<div id="main">

<!-- NAMES -->
<div class="section">
  <div class="names">
    Diya Fathima <br>&<br> Muhammed Rizwan
  </div>
</div>

<!-- PHOTO -->
<div class="section photo">
  <img src="photo.jpeg">
 
  <div class="wedding-date">
    <p class="wedding-date-text">August 2, 2026</p>
  </div>
</div>


<!-- COUNTDOWN -->
<div class="section">
  <h2>Countdown</h2>
  <div class="countdown">
    <div class="box" id="d"></div>
    <div class="box" id="h"></div>
    <div class="box" id="m"></div>
    <div class="box" id="s"></div>
  </div>
</div>

<!-- CALENDAR -->
<div class="section">
  <h2>August 2026</h2>
  <div class="calendar">
    <table>
      <tr>

      <tr>
        <td>25</td><td>26</td><td>27</td><td>28</td>
        <td>29</td><td>30</td><td>31</td>
      </tr>
    </table>
  </div>
</div>

<!-- EVENTS -->
<div class="section">
  <div class="card">
    <h3>Nikkah</h3>
    <p>August 2 | 12:00 PM</p>
  </div>
</div>

<!-- LOCATION -->


<div class="section">
  <div class="card">
    <h3>Venue</h3>
    <p>Community Hall, Palluruthy</p>

   <iframe 
  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3930.2644463208994!     2d76.27201017479234!3d9.911919590189083!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b0873b68277c0e5%3A0x34f128cc53cf13e8!2sK.%20Karunakaran%20Community%20Hall%2C%20Palluruthy!5e0!3m2!1sen!2sin!4v1776655718671"
  width="100%" 
  height="250" 
  style="border:0; border-radius:10px;" 
  allowfullscreen="" 
  loading="lazy">
</iframe>

      <a href="https://share.google/ln3YWO4WlHmzv2AZK" target="_blank">
      <button class="btn">Open in Google Maps</button>
    </a>
  </div>
 </div>

</div>

<script>
function openInvite(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";
}

// COUNTDOWN
var date = new Date("Aug 2, 2026 12:00:00").getTime();

setInterval(()=>{
  var now = new Date().getTime();
  var d = date - now;

  document.getElementById("d").innerHTML = Math.floor(d/(1000*60*60*24))+"<br>Days";
  document.getElementById("h").innerHTML = Math.floor((d%(1000*60*60*24))/(1000*60*60))+"<br>Hours";
  document.getElementById("m").innerHTML = Math.floor((d%(1000*60*60))/(1000*60))+"<br>Minutes";
  document.getElementById("s").innerHTML = Math.floor((d%(1000*60))/1000)+"<br>Seconds";
},1000);
</script>

</body>
</html>
